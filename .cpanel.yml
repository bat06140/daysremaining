---
# .cpanel.yml — Déploiement automatique du widget-server Node.js
#
# cPanel clone le dépôt dans DEPLOYPATH et exécute ces tâches depuis ce dossier.
# Après pnpm build, les artefacts sont déjà au bon endroit :
#   apps/widget-server/dist/   ← server compilé
#   apps/widget-client/dist/   ← client Vite
#
# Configuration Node.js dans cPanel (à faire une seule fois manuellement) :
#   Application root    : /home/mupe3654/repositories/notion-widgets/apps/widget-server
#   Application startup : dist/index.js
#   Node.js version     : 20.x
#   .env                : à créer manuellement (voir apps/widget-server/.env.example)

deployment:
  tasks:
    # ── Installer pnpm (absent par défaut sur cPanel) ──────────────────────
    - npm install --global pnpm@10 --silent

    # ── Installer toutes les dépendances (dev inclus, turbo en a besoin) ───
    - pnpm install --frozen-lockfile

    # ── Build client (Vite) + server (tsc) orchestrés par turbo ───────────
    - pnpm build

    # ── Redémarrage Passenger ──────────────────────────────────────────────
    # Passenger surveille tmp/restart.txt dans l'Application Root cPanel.
    # Chemin absolu pour éviter toute ambiguïté sur le CWD d'exécution.
    - mkdir -p $HOME/repositories/notion-widgets/apps/widget-server/tmp
    - touch $HOME/repositories/notion-widgets/apps/widget-server/tmp/restart.txt
