name: Build & Deploy widget-server

on:
  push:
    branches: [main]
    paths:
      - 'apps/widget-server/**'
      - 'apps/widget-client/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Force les actions tierces (checkout, pnpm/action-setup) a utiliser Node 24
      # au lieu de Node 20 (deprecie depuis 2026-09-16)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Pas de 'version' ici : la version est lue depuis packageManager dans package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # turbo orchestre dans l'ordre : @repo/shared -> widget-client + widget-server
        # Produit :
        #   apps/widget-server/dist/  <- server TypeScript compile
        #   apps/widget-client/dist/  <- Vite bundle (servi par Express)
        run: pnpm build

      - name: Get runner public IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Remove all whitelisted IPs
        run: |
          curl -sm 45 \
            -H 'Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}' \
            'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove_all'

      - name: Whitelist runner IP
        run: |
          curl -sm 45 \
            -H 'Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}' \
            'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${{ steps.ip.outputs.ipv4 }}&port=22'

      - name: Verify IP is whitelisted
        run: |
          curl -sm 45 \
            -H 'Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}' \
            'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/list' \
          | grep '${{ steps.ip.outputs.ipv4 }}'

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 0400 ~/.ssh/id_rsa

      # pnpm deploy cree un dossier standalone avec :
      #   dist/          <- server compile
      #   node_modules/  <- prod only, @repo/shared resolu comme copie locale
      #   package.json

      - name: Create standalone server package
        run: pnpm --filter @repo/widget-server deploy --prod --legacy /tmp/widget-server-deploy

      - name: Deploy server (dist + node_modules)
        run: |
          # Creation du repertoire cible s'il n'existe plus
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            "mkdir -p ~/repositories/notion-widgets/apps/widget-server/"

          rsync --timeout=60 \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            -avL --delete \
            /tmp/widget-server-deploy/ \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }}:/home/${{ secrets.CPANEL_USERNAME }}/repositories/notion-widgets/apps/widget-server/

      - name: Deploy client dist (served by Express)
        run: |
          # Creation du repertoire cible client
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            "mkdir -p ~/repositories/notion-widgets/apps/widget-client/dist/"

          rsync --timeout=60 \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            -av --delete \
            apps/widget-client/dist/ \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }}:/home/${{ secrets.CPANEL_USERNAME }}/repositories/notion-widgets/apps/widget-client/dist/

      - name: Restart Passenger
        # tmp/restart.txt est relatif a l'Application Root cPanel,
        # soit ~/repositories/notion-widgets/apps/widget-server/
        # PAS dans dist/ (erreur frequente)
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            "mkdir -p ~/repositories/notion-widgets/apps/widget-server/tmp \
             && touch ~/repositories/notion-widgets/apps/widget-server/tmp/restart.txt"

      - name: Cleanup SSH key
        if: always()
        run: rm -fr ~/.ssh

      - name: Remove runner IP from whitelist
        if: always()
        run: |
          curl -sm 45 \
            -H 'Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}' \
            'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove?address=${{ steps.ip.outputs.ipv4 }}'

